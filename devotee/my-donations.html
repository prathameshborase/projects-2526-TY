<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Donations | श्री एकवीरा आई</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/devotee.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <i class="fas fa-arrow-left me-2"></i> परत जा
            </a>
            <span class="navbar-text text-white fw-bold">माझे योगदान</span>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card service-card border-0 shadow-sm">
                    <i class="fas fa-hand-holding-heart service-icon"></i>
                    <h3 class="fw-bold text-success" id="totalDonatedAmt">₹ 0</h3>
                    <p class="text-muted">तुमचे एकूण योगदान</p>
                    <hr>
                    <p class="small text-muted italic">"तुमच्या दानाने मंदिराच्या कार्यास बळ मिळते. आई एकवीरा तुमचा उद्धार करो!"</p>
                </div>
            </div>

            <div class="col-md-8">
                <div class="history-card">
                    <h5 class="fw-bold mb-4 text-danger">देणगी इतिहास</h5>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>पावती क्र.</th>
                                    <th>तारीख</th>
                                    <th>उद्देश</th>
                                    <th>रक्कम</th>
                                </tr>
                            </thead>
                            <tbody id="myDonationList">
                                </tbody>
                        </table>
                    </div>
                    <div id="noDonationMsg" class="text-center p-4 d-none">
                        <p class="text-muted">तुम्ही अद्याप देणगी दिलेली नाही.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.js"></script>
    <script>
        window.onload = function() {
            // १. सध्याचा युजर मिळवा
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) {
                window.location.href = '../login.html';
                return;
            }

            // २. सर्व देणग्यांतून या युजरची देणगी फिल्टर करा
            const allDonations = JSON.parse(localStorage.getItem('donations')) || [];
            const myDonations = allDonations.filter(d => d.user_id === user.id);

            const tableBody = document.getElementById('myDonationList');
            const totalDisp = document.getElementById('totalDonatedAmt');
            let totalSum = 0;

            if (myDonations.length === 0) {
                document.getElementById('noDonationMsg').classList.remove('d-none');
                return;
            }

            // ३. टेबलमध्ये डेटा भरणे
            tableBody.innerHTML = myDonations.map(d => {
                totalSum += parseFloat(d.amount);
                return `
                    <tr>
                        <td><small class="text-muted">#${d.receipt_no}</small></td>
                        <td>${d.date}</td>
                        <td><span class="badge bg-light text-dark border">${d.category}</span></td>
                        <td class="fw-bold text-success">₹ ${d.amount}</td>
                    </tr>
                `;
            }).join('');

            totalDisp.innerText = "₹ " + totalSum.toLocaleString('en-IN');
        };
    </script>
</body>
</html>
