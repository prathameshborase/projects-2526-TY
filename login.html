<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register | श्री एकवीरा आई</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('assets/images/temple-bg.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
        }
        .auth-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
        }
        .nav-pills .nav-link {
            color: #555;
            font-weight: 600;
            border-radius: 10px;
        }
        .nav-pills .nav-link.active {
            background-color: #dc3545;
            color: white;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
        }
        .btn-auth {
            background-color: #dc3545;
            color: white;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            border: none;
            transition: 0.3s;
        }
        .btn-auth:hover {
            background-color: #8B0000;
            color: #D4AF37;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-danger">श्री एकवीरा मंदिर</h3>
            <p class="text-muted small">प्रवेश करा किंवा नवीन नोंदणी करा</p>
        </div>

        <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">Login</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab">Register</button>
            </li>
        </ul>

        <div class="tab-content" id="pills-tabContent">
            
            <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                <form onsubmit="handleLogin(event)">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">ईमेल (Email)</label>
                        <input type="email" id="loginEmail" class="form-control" placeholder="example@mail.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">पासवर्ड (Password)</label>
                        <input type="password" id="loginPass" class="form-control" placeholder="******" required>
                    </div>
                    <button type="submit" class="btn-auth">Login करा</button>
                </form>
            </div>

            <div class="tab-pane fade" id="pills-register" role="tabpanel">
                <form onsubmit="handleRegister(event)">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">पूर्ण नाव (Full Name)</label>
                        <input type="text" id="regName" class="form-control" placeholder="तुमचे नाव टाका" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">ईमेल (Email)</label>
                        <input type="email" id="regEmail" class="form-control" placeholder="example@mail.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">पासवर्ड सेट करा</label>
                        <input type="password" id="regPass" class="form-control" placeholder="किमान ६ अक्षरे" required>
                    </div>
                    <button type="submit" class="btn-auth">नोंदणी पूर्ण करा</button>
                </form>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="index.html" class="text-muted small text-decoration-none"><i class="fas fa-arrow-left"></i> होमपेजवर परत जा</a>
        </div>
    </div>

    <script src="js/bootstrap.bundle.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
