<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery | Ekvira Devi Temple</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/home.css">

    <style>
        /* GALLERY SPECIFIC CSS */
        .gallery-header {
            background: linear-gradient(rgba(139, 0, 0, 0.8), rgba(139, 0, 0, 0.8)), url('images/ekviradevi (7).jpg');
            background-size: cover;
            background-position: center;
            border-bottom: 5px solid var(--gold);
            padding: 60px 0;
        }

        .gallery-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            height: 280px;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .gallery-card:hover img {
            transform: scale(1.1);
        }

        .gallery-card .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(139, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
            color: white;
        }

        .gallery-card:hover .overlay {
            opacity: 1;
        }

        /* LIGHTBOX STYLING */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80%;
            border: 4px solid var(--gold);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .close-btn {
            position: absolute;
            top: 25px; right: 35px;
            color: white;
            font-size: 45px;
            cursor: pointer;
        }

        .filter-btn {
            min-width: 120px;
            font-weight: bold;
            border: 2px solid var(--gold) !important;
        }
    </style>
</head>
<body class="body">

    <div class="marq text-white py-2">
        <marquee behavior="alternate">
            <span class="marq-title">🌺 श्री एकवीरा देवी आणि रेणुका माता मंदिर, देवपूर, धुळे - फोटो गॅलरी 🌺</span>
        </marquee>
    </div>

    <nav class="navbar navbar-expand-lg sticky-top" style="background-color: var(--primary-red); border-bottom: 3px solid var(--gold);">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="images/ekviradevi (71).jpg" alt="Logo" width="50" height="50" class="rounded-circle me-2 border border-warning">
                <span class="text-white fw-bold">Ekvira Devi Temple</span>
            </a>
            <button class="navbar-toggler bg-warning" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto menu">
                    <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="darshan.html">Darshan</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="donation.html">Donations</a></li>
                    <li class="nav-item"><a class="nav-link text-white active" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="about.html">About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="gallery-header text-center text-white">
        <h1 class="display-4 fw-bold">दर्शन दालन</h1>
        <p class="lead text-warning">मंदिर परिसरातील काही विलोभनीय क्षण</p>
    </header>

    <div class="container mt-5">
        <div class="d-flex justify-content-center flex-wrap gap-3 mb-4">
            <button class="btn btn-danger filter-btn active" onclick="filterGallery('all')">सर्व (All)</button>
            <button class="btn btn-outline-danger filter-btn text-dark" onclick="filterGallery('murti')">मूर्ती (Idols)</button>
            <button class="btn btn-outline-danger filter-btn text-dark" onclick="filterGallery('temple')">मंदिर (Temple)</button>
            <button class="btn btn-outline-danger filter-btn text-dark" onclick="filterGallery('festival')">उत्सव (Festival)</button>
        </div>

        <div class="row g-4" id="galleryGrid">
            </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-btn">&times;</span>
        <img id="lightboxImg" src="" alt="Full View">
    </div>

    <footer class="footer mt-5 py-4 text-center text-white" style="background-color: var(--primary-red); border-top: 5px solid var(--gold);">
        <p class="m-0">&copy; 2024 Ekvira Devi Temple | Dhule</p>
    </footer>

    <script>
        // १. तुझे सर्व फोटो इथे एका खाली एक ॲड कर
        const images = [
            { src: 'images/ekviradevi (7).jpg', cat: 'murti' },
            { src: 'images/ekviradevi (7).jpg', cat: 'temple' },
            { src: 'images/ekviradevi (7).jpg', cat: 'festival' },
            { src: 'images/ekviradevi (7).jpg', cat: 'murti' },
            { src: 'images/ekviradevi (7).jpg', cat: 'temple' },
            { src: 'images/ekviradevi (7).jpg', cat: 'festival' },
            { src: 'images/ekviradevi (7).jpg', cat: 'murti' },
            { src: 'images/ekviradevi (7).jpg', cat: 'temple' },
            { src: 'images/ekviradevi (7).jpg', cat: 'festival' },
            { src: 'images/ekviradevi (7).jpg', cat: 'murti' }
            // तू अजून हवे तेवढे (उदा. १०-२०-५०) फोटो इथे याच फॉरमॅटमध्ये टाकू शकतोस
        ];

        const grid = document.getElementById('galleryGrid');

        // २. फोटो रेंडर करण्याचे फंक्शन
        function loadGallery() {
            grid.innerHTML = images.map(img => `
                <div class="col-lg-4 col-md-6 gallery-item ${img.cat}">
                    <div class="gallery-card shadow" onclick="openLightbox('images/${img.src}')">
                        <img src="images/${img.src}" alt="Temple" loading="lazy">
                        <div class="overlay">
                            <i class="fas fa-eye fa-2x mb-2"></i>
                            <span>View Full Image</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ३. फिल्टर फंक्शन
        function filterGallery(category) {
            const items = document.querySelectorAll('.gallery-item');
            items.forEach(item => {
                if (category === 'all' || item.classList.contains(category)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });

            // बटन स्टाईल अपडेट
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(btn => {
                btn.classList.remove('btn-danger', 'text-white');
                btn.classList.add('btn-outline-danger', 'text-dark');
            });
            event.target.classList.add('btn-danger', 'text-white');
            event.target.classList.remove('btn-outline-danger', 'text-dark');
        }

        // ४. लाईटबॉक्स फंक्शन
        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lightboxImg').src = src;
            lb.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        // पेज उघडल्यावर गॅलरी लोड करा
        window.onload = loadGallery;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
