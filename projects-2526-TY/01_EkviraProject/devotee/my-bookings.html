<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pooja Bookings | श्री एकवीरा आई</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/devotee.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <i class="fas fa-arrow-left me-2"></i> डॅशबोर्डवर परत जा
            </a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="text-center mb-5">
            <h2 class="fw-bold text-danger">माझे पूजा बुकिंग्स</h2>
            <p class="text-muted">तुमच्या सर्व आगामी आणि मागील पूजेची स्थिती येथे पहा.</p>
        </div>

        <div class="row">
            <div class="col-md-10 mx-auto">
                <div class="history-card">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>बुकिंग ID</th>
                                    <th>पूजेचा प्रकार</th>
                                    <th>तारीख</th>
                                    <th>वेळ</th>
                                    <th>स्थिती (Status)</th>
                                </tr>
                            </thead>
                            <tbody id="myBookingList">
                                </tbody>
                        </table>
                    </div>
                    <div id="noDataMsg" class="text-center p-4 d-none">
                        <i class="fas fa-calendar-times fa-3x text-muted mb-3"></i>
                        <p>तुम्ही अजून कोणतीही पूजा बुक केलेली नाही.</p>
                        <a href="../darshan.html" class="btn btn-devotee">आताच बुक करा</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    

    <script src="../js/bootstrap.bundle.js"></script>
    <script>
        window.onload = function() {
            // १. सध्याचा युजर मिळवा
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = '../login.html';
                return;
            }

            // २. सर्व बुकिंग्स मिळवा आणि फिल्टर करा
            const allBookings = JSON.parse(localStorage.getItem('bookings')) || [];
            const myBookings = allBookings.filter(b => b.user_id === currentUser.id);

            const tableBody = document.getElementById('myBookingList');
            const noDataMsg = document.getElementById('noDataMsg');

            if (myBookings.length === 0) {
                noDataMsg.classList.remove('d-none');
                return;
            }

            // ३. टेबलमध्ये डेटा भरा
            tableBody.innerHTML = myBookings.map(b => `
                <tr>
                    <td><small class="text-muted">#${b.booking_id}</small></td>
                    <td class="fw-bold text-dark">${b.pooja_type}</td>
                    <td>${b.booking_date}</td>
                    <td>${b.slot_time}</td>
                    <td>
                        <span class="badge ${getStatusBadge(b.status)}">
                            ${translateStatus(b.status)}
                        </span>
                    </td>
                </tr>
            `).join('');
        };

        function getStatusBadge(status) {
            if (status === 'Confirmed') return 'bg-success';
            if (status === 'Pending') return 'bg-warning text-dark';
            if (status === 'Cancelled') return 'bg-danger';
            return 'bg-secondary';
        }

        function translateStatus(status) {
            if (status === 'Confirmed') return 'मंजूर (Confirmed)';
            if (status === 'Pending') return 'प्रलंबित (Pending)';
            if (status === 'Cancelled') return 'रद्द (Cancelled)';
            return status;
        }
    </script>
</body>
</html>
