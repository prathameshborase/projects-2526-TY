<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Ekvira Devi</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="d-flex">
        <div class="admin-sidebar p-3">
            <div class="text-center mb-4">
                <img src="../assets/images/ekviradevi (71).jpg" width="80" class="rounded-circle border border-warning">
                <h5 class="mt-2 text-warning fw-bold">मंदिर प्रशासन</h5>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link active text-white py-3 border-bottom border-secondary" href="dashboard.html">
                    <i class="fas fa-chart-line me-2"></i> Dashboard
                </a>
                <a class="nav-link text-white py-3 border-bottom border-secondary" href="donations.html">
                    <i class="fas fa-hand-holding-heart me-2"></i> Donations
                </a>
                <a class="nav-link text-white py-3 border-bottom border-secondary" href="bookings.html">
                    <i class="fas fa-calendar-check me-2"></i> Pooja Bookings
                </a>
                <a class="nav-link text-white py-3 border-bottom border-secondary" href="manage-gallery.html">
                    <i class="fas fa-images me-2"></i> Manage Gallery
                </a>
                <a class="nav-link text-white py-3 border-bottom border-secondary" href="inventory.html">
                    <i class="fas fa-boxes me-2"></i> Inventory
                </a>
                <a class="nav-link text-warning fw-bold mt-5" href="#" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-2"></i> Logout
                </a>
            </nav>
        </div>

        <div class="flex-grow-1 p-4 bg-light">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-danger">प्रशासन डॅशबोर्ड</h3>
                <div class="badge bg-danger p-2 px-3 border border-warning">Status: Online</div>
            </div>

            <div class="row g-4 mb-5">
                <div class="col-md-3">
                    <div class="card admin-card p-3 shadow-sm bg-white text-center">
                        <h6 class="text-muted">एकूण देणगी</h6>
                        <h3 class="fw-bold text-danger" id="statDonation">₹ 0</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card admin-card p-3 shadow-sm bg-white text-center">
                        <h6 class="text-muted">आजचे बुकिंग</h6>
                        <h3 class="fw-bold text-danger" id="statBookings">0</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card admin-card p-3 shadow-sm bg-white text-center">
                        <h6 class="text-muted">एकूण भाविक</h6>
                        <h3 class="fw-bold text-danger" id="statUsers">0</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card admin-card p-3 shadow-sm bg-white text-center">
                        <h6 class="text-muted">इन्व्हेंटरी अलर्ट</h6>
                        <h3 class="fw-bold text-warning">Low</h3>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-8">
                    <div class="card p-4 shadow-sm border-0 rounded-4">
                        <h5 class="fw-bold text-danger mb-4">देणगी रिपोर्ट (Monthly)</h5>
                        <canvas id="donationChart" height="120"></canvas>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-4 shadow-sm border-0 rounded-4">
                        <h5 class="fw-bold text-danger mb-4">बुकिंग स्टेटस</h5>
                        <canvas id="bookingPieChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
    
    <script>
        // डॅशबोर्डवर डेटा लोड करण्यासाठी
        window.onload = function() {
            checkAuth('admin'); // Security Check
            
            // डेटा मिळवणे
            const donations = JSON.parse(localStorage.getItem('donations')) || [];
            const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            const users = JSON.parse(localStorage.getItem('users')) || [];

            // आकडेवारी अपडेट करणे
            const totalAmt = donations.reduce((sum, d) => sum + d.amount, 0);
            document.getElementById('statDonation').innerText = "₹ " + totalAmt;
            document.getElementById('statBookings').innerText = bookings.length;
            document.getElementById('statUsers').innerText = users.length;

            // Chart Logic
            const ctx = document.getElementById('donationChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
                    datasets: [{
                        label: 'देणगी (₹)',
                        data: [12000, 18000, 15000, 25000, 22000],
                        borderColor: '#8B0000',
                        backgroundColor: 'rgba(139, 0, 0, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                }
            });
        };
    </script>
</body>
</html>
