<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Management | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="admin-sidebar">
        <div class="p-3 text-center border-bottom border-secondary mb-3">
            <h5 class="text-warning fw-bold">ADMIN PANEL</h5>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a class="nav-link" href="donations.html"><i class="fas fa-hand-holding-heart"></i> Donations</a>
            <a class="nav-link" href="bookings.html"><i class="fas fa-calendar-check"></i> Bookings</a>
            <a class="nav-link active" href="inventory.html"><i class="fas fa-boxes"></i> Inventory</a>
            <a class="nav-link text-warning mt-5" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-danger">मंदिर साठा व्यवस्थापन (Inventory)</h3>
            <button class="btn btn-royal btn-sm" data-bs-toggle="modal" data-bs-target="#addItemModal">
                <i class="fas fa-plus"></i> नवीन वस्तू जोडा
            </button>
        </div>

        <div class="row g-4" id="inventoryContainer">
            </div>
    </div>

    <div class="modal fade" id="editStockModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">साठा अपडेट करा</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editItemId">
                    <div class="mb-3">
                        <label class="form-label">नवीन संख्या (Quantity)</label>
                        <input type="number" id="newQty" class="form-control">
                    </div>
                    <button class="btn btn-danger w-100" onclick="saveStock()">सेव्ह करा</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.js"></script>
    <script>
        function loadInventory() {
            const inventory = JSON.parse(localStorage.getItem('inventory')) || [];
            const container = document.getElementById('inventoryContainer');

            container.innerHTML = inventory.map(item => `
                <div class="col-md-4">
                    <div class="card stat-card p-3 bg-white border-0 shadow-sm">
                        <div class="d-flex justify-content-between">
                            <h5 class="fw-bold">${item.item_name}</h5>
                            <i class="fas fa-box text-warning"></i>
                        </div>
                        <h2 class="my-3 ${item.quantity_available < 50 ? 'text-danger' : 'text-success'}">
                            ${item.quantity_available} <small class="h6 text-muted">${item.unit}</small>
                        </h2>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="small text-muted">Update: ${item.last_updated}</span>
                            <button class="btn btn-sm btn-outline-danger" onclick="openEdit('${item.item_id}', ${item.quantity_available})">
                                Edit
                            </button>
                        </div>
                        ${item.quantity_available < 50 ? '<div class="alert alert-danger p-1 mt-2 mb-0 small text-center">Low Stock!</div>' : ''}
                    </div>
                </div>
            `).join('');
        }

        function openEdit(id, qty) {
            document.getElementById('editItemId').value = id;
            document.getElementById('newQty').value = qty;
            new bootstrap.Modal(document.getElementById('editStockModal')).show();
        }

        function saveStock() {
            const id = document.getElementById('editItemId').value;
            const qty = document.getElementById('newQty').value;
            let inventory = JSON.parse(localStorage.getItem('inventory'));

            const index = inventory.findIndex(i => i.item_id === id);
            if(index !== -1) {
                inventory[index].quantity_available = parseInt(qty);
                inventory[index].last_updated = new Date().toISOString().split('T')[0];
                localStorage.setItem('inventory', JSON.stringify(inventory));
                location.reload();
            }
        }

        window.onload = loadInventory;
    </script>
</body>
</html>
