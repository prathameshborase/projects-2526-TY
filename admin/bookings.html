<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pooja Booking Management | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="admin-sidebar">
        <div class="p-3 text-center border-bottom border-secondary mb-3">
            <h5 class="text-warning fw-bold">ADMIN PANEL</h5>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a class="nav-link" href="donations.html"><i class="fas fa-hand-holding-heart"></i> Donations</a>
            <a class="nav-link active" href="bookings.html"><i class="fas fa-calendar-check"></i> Bookings</a>
            <a class="nav-link" href="inventory.html"><i class="fas fa-boxes"></i> Inventory</a>
            <a class="nav-link text-warning mt-5" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold text-danger">पूजा बुकिंग व्यवस्थापन</h3>
                <p class="text-muted">येथे तुम्ही भाविकांचे बुकिंग मंजूर किंवा रद्द करू शकता.</p>
            </div>
            <div class="badge bg-warning text-dark p-2">एकूण बुकिंग: <span id="bookingCount">0</span></div>
        </div>

        <div class="card shadow-sm border-0 rounded-3">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>भाविकाचे नाव</th>
                            <th>पूजेचा प्रकार</th>
                            <th>तारीख व वेळ</th>
                            <th>व्यक्ती</th>
                            <th>स्थिती (Status)</th>
                            <th>ॲक्शन</th>
                        </tr>
                    </thead>
                    <tbody id="bookingTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.js"></script>
    <script src="../js/auth.js"></script>
    
    <script>
        // १. बुकिंग डेटा लोड करणे
        function loadBookings() {
            const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            const tableBody = document.getElementById('bookingTableBody');
            document.getElementById('bookingCount').innerText = bookings.length;

            if (bookings.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="text-center p-4">कोणतेही बुकिंग सापडले नाही.</td></tr>`;
                return;
            }

            tableBody.innerHTML = bookings.map((b, index) => `
                <tr>
                    <td>${b.booking_id}</td>
                    <td class="fw-bold">${b.user_name}</td>
                    <td><span class="badge bg-light text-danger border border-danger">${b.pooja_type}</span></td>
                    <td>${b.booking_date} | ${b.slot_time}</td>
                    <td>${b.persons}</td>
                    <td>
                        <span class="badge ${getStatusClass(b.status)}">${b.status}</span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-success" onclick="updateStatus('${b.booking_id}', 'Confirmed')">
                            <i class="fas fa-check"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="updateStatus('${b.booking_id}', 'Cancelled')">
                            <i class="fas fa-times"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // २. स्टेटस नुसार रंग बदलणे
        function getStatusClass(status) {
            if (status === 'Confirmed') return 'bg-success';
            if (status === 'Pending') return 'bg-warning text-dark';
            if (status === 'Cancelled') return 'bg-danger';
            return 'bg-secondary';
        }

        // ३. स्टेटस अपडेट करणे (Approve/Reject Logic)
        function updateStatus(id, newStatus) {
            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            const index = bookings.findIndex(b => b.booking_id === id);
            
            if (index !== -1) {
                bookings[index].status = newStatus;
                localStorage.setItem('bookings', JSON.stringify(bookings));
                alert("बुकिंग स्थिती अपडेट झाली: " + newStatus);
                loadBookings(); // टेबल रिफ्रेश करा
            }
        }

        window.onload = loadBookings;
    </script>
</body>
</html>
