<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donation Management | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="admin-sidebar">
        <div class="p-3 text-center">
            <h5 class="text-warning fw-bold">ADMIN PANEL</h5>
        </div>
        <nav class="nav flex-column mt-3">
            <a class="nav-link" href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a class="nav-link active" href="donations.html"><i class="fas fa-hand-holding-heart"></i> Donations</a>
            <a class="nav-link" href="bookings.html"><i class="fas fa-calendar-check"></i> Bookings</a>
            <a class="nav-link" href="inventory.html"><i class="fas fa-boxes"></i> Inventory</a>
            <a class="nav-link text-warning mt-5" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-danger">सर्व देणगी यादी (Donation Records)</h3>
            <button class="btn btn-danger" onclick="window.print()"><i class="fas fa-print"></i> Report</button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>नाव</th>
                        <th>रक्कम (₹)</th>
                        <th>श्रेणी (Category)</th>
                        <th>UTR / ID</th>
                        <th>तारीख</th>
                    </tr>
                </thead>
                <tbody id="donationTable">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.js"></script>
    <script>
        window.onload = function() {
            const donations = JSON.parse(localStorage.getItem('donations')) || [];
            const tableBody = document.getElementById('donationTable');

            tableBody.innerHTML = donations.map(d => `
                <tr>
                    <td>${d.donation_id}</td>
                    <td class="fw-bold">${d.name}</td>
                    <td class="text-success fw-bold">₹ ${d.amount}</td>
                    <td><span class="badge bg-info text-dark">${d.category}</span></td>
                    <td><code>${d.transaction_id}</code></td>
                    <td>${d.date}</td>
                </tr>
            `).join('');
        };
    </script>
</body>
</html>
