<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Records | Admin Panel</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="d-flex">
        <div class="admin-sidebar">
            <div class="p-3 text-center border-bottom border-secondary mb-3">
                <h5 class="text-warning fw-bold">ADMIN PANEL</h5>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link" href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a class="nav-link active" href="donations-list.html"><i class="fas fa-list-ul"></i> Donation List</a>
                <a class="nav-link" href="bookings.html"><i class="fas fa-calendar-check"></i> Bookings</a>
                <a class="nav-link text-warning mt-5" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </div>

        <div class="main-content flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-danger">देणगी अहवाल (Detailed Records)</h3>
                <div class="d-flex gap-2">
                    <input type="text" id="donationSearch" class="form-control" placeholder="नाव किंवा UTR ने शोधा..." onkeyup="searchDonations()">
                    <button class="btn btn-dark" onclick="window.print()"><i class="fas fa-file-export"></i> Export</button>
                </div>
            </div>

            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" id="donationTable">
                            <thead class="bg-danger text-white">
                                <tr>
                                    <th>पावती क्र.</th>
                                    <th>देणगीदाराचे नाव</th>
                                    <th>रक्कम (₹)</th>
                                    <th>उद्देश (Category)</th>
                                    <th>ट्रान्झॅक्शन आयडी</th>
                                    <th>दिनांक</th>
                                    <th>कृती</th>
                                </tr>
                            </thead>
                            <tbody id="donationListBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="mt-4 p-3 bg-white rounded shadow-sm d-flex justify-content-between">
                <h5 class="fw-bold text-dark">एकूण जमा देणगी:</h5>
                <h4 class="fw-bold text-success" id="totalDisplayAmt">₹ 0.00</h4>
            </div>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.js"></script>
    <script src="../js/auth.js"></script>

    <script>
        // १. देणगी डेटा लोड करणे
        function loadDonationData() {
            const donations = JSON.parse(localStorage.getItem('donations')) || [];
            const listBody = document.getElementById('donationListBody');
            let total = 0;

            if (donations.length === 0) {
                listBody.innerHTML = `<tr><td colspan="7" class="text-center p-5 text-muted">अद्याप कोणताही देणगी रेकॉर्ड उपलब्ध नाही.</td></tr>`;
                return;
            }

            listBody.innerHTML = donations.map(don => {
                total += parseFloat(don.amount);
                return `
                    <tr>
                        <td><small class="text-muted">#${don.receipt_no}</small></td>
                        <td class="fw-bold">${don.name}</td>
                        <td class="text-success fw-bold">₹ ${don.amount}</td>
                        <td><span class="badge rounded-pill bg-warning text-dark">${don.category}</span></td>
                        <td><code class="text-primary">${don.transaction_id}</code></td>
                        <td>${don.date}</td>
                        <td>
                            <button class="btn btn-outline-danger btn-sm" onclick="deleteDonation('${don.donation_id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');

            document.getElementById('totalDisplayAmt').innerText = "₹ " + total.toLocaleString('en-IN');
        }

        // २. सर्चिंग लॉजिक (Search Filter)
        function searchDonations() {
            let input = document.getElementById('donationSearch').value.toLowerCase();
            let tableRows = document.querySelectorAll('#donationListBody tr');

            tableRows.forEach(row => {
                let text = row.innerText.toLowerCase();
                row.style.display = text.includes(input) ? "" : "none";
            });
        }

        // ३. देणगी डिलीट करणे (Security: फक्त ॲडमिनसाठी)
        function deleteDonation(id) {
            if (confirm("तुम्हाला खात्री आहे की हा रेकॉर्ड काढून टाकायचा आहे?")) {
                let donations = JSON.parse(localStorage.getItem('donations')) || [];
                donations = donations.filter(d => d.donation_id !== id);
                localStorage.setItem('donations', JSON.stringify(donations));
                loadDonationData();
            }
        }

        window.onload = loadDonationData;
    </script>
</body>
</html>
