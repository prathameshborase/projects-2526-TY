<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Temple Settings | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-sidebar">
        <div class="p-3 text-center border-bottom border-secondary mb-3">
            <h5 class="text-warning fw-bold">ADMIN PANEL</h5>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a class="nav-link active" href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            <a class="nav-link text-warning mt-5" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <h3 class="fw-bold text-danger mb-4">वेळापत्रक आणि सूचना (Settings)</h3>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card p-4 shadow-sm border-0">
                    <h5 class="fw-bold"><i class="fas fa-bullhorn text-danger"></i> नवीन सूचना टाका</h5>
                    <textarea id="noticeText" class="form-control my-3" rows="4" placeholder="येथे तुमची सूचना लिहा..."></textarea>
                    <button class="btn btn-danger w-100" onclick="saveNotice()">Update Notice Board</button>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-4 shadow-sm border-0">
                    <h5 class="fw-bold"><i class="fas fa-clock text-danger"></i> मंदिराची वेळ बदला</h5>
                    <div class="mb-2">
                        <label>उघडण्याची वेळ:</label>
                        <input type="time" class="form-control" value="06:00">
                    </div>
                    <div class="mb-3">
                        <label>बंद होण्याची वेळ:</label>
                        <input type="time" class="form-control" value="21:00">
                    </div>
                    <button class="btn btn-dark w-100">वेळ अपडेट करा</button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/bootstrap.bundle.js"></script>
    <script>
        function saveNotice() {
            const text = document.getElementById('noticeText').value;
            localStorage.setItem('templeNotice', text);
            alert("सूचना अपडेट झाली आहे!");
        }
    </script>
</body>
</html>
