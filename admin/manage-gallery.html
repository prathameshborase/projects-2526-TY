<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Gallery | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-sidebar">... (Sidebar Same as above) ...</div>

    <div class="main-content">
        <h3 class="fw-bold text-danger mb-4">गॅलरी व्यवस्थापन</h3>
        <div class="card p-4 shadow-sm border-0 mb-4">
            <h5 class="fw-bold">नवीन फोटो जोडा</h5>
            <div class="row g-2 mt-2">
                <div class="col-md-9"><input type="text" id="imgUrl" class="form-control" placeholder="Image URL टाका..."></div>
                <div class="col-md-3"><button class="btn btn-royal w-100" onclick="addPhoto()">Add Photo</button></div>
            </div>
        </div>

        <div class="row g-3" id="galleryAdminView">
            </div>
    </div>
    <script>
        // सँपल फोटो रेंडरिंग
        function loadGallery() {
            const galleryView = document.getElementById('galleryAdminView');
            galleryView.innerHTML = `
                <div class="col-md-3"><div class="card shadow-sm p-1"><img src="../assets/images/ekviradevi (71).jpg" class="img-fluid"><button class="btn btn-sm btn-danger mt-1">Delete</button></div></div>
            `;
        }
        window.onload = loadGallery;
    </script>
</body>
</html>
