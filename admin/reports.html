<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reports | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="main-content mx-auto" style="margin-left: 0 !important; max-width: 900px;">
        <div class="text-center mb-5">
            <h2 class="fw-bold text-danger">श्री एकवीरा देवी मंदिर - अहवाल (2026)</h2>
            <p>धुळे, महाराष्ट्र</p>
            <hr>
        </div>

        <table class="table table-bordered">
            <thead class="table-light">
                <tr><th>तपशील</th><th>एकूण संख्या / रक्कम</th></tr>
            </thead>
            <tbody>
                <tr><td>एकूण देणगी (Donations)</td><td class="fw-bold text-success">₹ 1,24,000</td></tr>
                <tr><td>एकूण पूजा बुकिंग (Bookings)</td><td>156</td></tr>
                <tr><td>नोंदणीकृत भाविक (Users)</td><td>520</td></tr>
            </tbody>
        </table>

        <div class="mt-5 text-end">
            <p>प्रशासकाची स्वाक्षरी: _________________</p>
            <button class="btn btn-dark d-print-none" onclick="window.print()">Download Report (PDF)</button>
        </div>
    </div>
</body>
</html>
